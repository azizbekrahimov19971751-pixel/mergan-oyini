<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏹 Kamonchi — Merganlik Sinovi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04080a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; user-select: none; touch-action: none; }
  canvas { background: #000; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 100%; height: auto; }
  #hud { color: #ffd700; font-size: 20px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="hud">Ball: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  
  let W = window.innerWidth > 500 ? 500 : window.innerWidth;
  let H = window.innerHeight > 700 ? 700 : window.innerHeight;
  canvas.width = W; canvas.height = H;

  let score = 0;
  let target = { x: W/2, y: 100, r: 30, speed: 2 };
  let arrow = { x: W/2, y: H - 50, active: false, speed: 10 };

  function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // Nishon
    ctx.beginPath();
    ctx.arc(target.x, target.y, target.r, 0, Math.PI*2);
    ctx.fillStyle = "red";
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.stroke();

    target.x += target.speed;
    if(target.x > W - target.r || target.x < target.r) target.speed *= -1;

    // O'q
    if(arrow.active) {
      ctx.fillStyle = "yellow";
      ctx.fillRect(arrow.x - 2, arrow.y, 4, 20);
      arrow.y -= arrow.speed;

      if(arrow.y < 0) arrow.active = false;

      let dx = arrow.x - target.x;
      let dy = arrow.y - target.y;
      if(Math.sqrt(dx*dx + dy*dy) < target.r) {
        score += 10;
        scoreEl.innerText = score;
        arrow.active = false;
        target.speed += (target.speed > 0 ? 0.5 : -0.5);
      }
    } else {
      arrow.y = H - 50;
      arrow.x = W/2;
      ctx.fillStyle = "white";
      ctx.fillRect(arrow.x - 2, arrow.y, 4, 20);
    }
    requestAnimationFrame(draw);
  }

  canvas.addEventListener('touchstart', () => {
    if(!arrow.active) arrow.active = true;
  });

  draw();
</script>
</body>
</html>
